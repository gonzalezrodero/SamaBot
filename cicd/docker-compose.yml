version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: samabot-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres 
      POSTGRES_DB: samabot
    ports:
      - "5433:5432"
    volumes:
      - samabot_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: samabot-ollama
    ports:
      - "11434:11434"
    volumes:
      - samabot_ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: samabot-ollama-init
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    command: >
      bash -c "
      echo 'Waiting for Ollama engine to start...' &&
      sleep 5 &&
      echo 'Downloading text model (llama3)...' &&
      ollama pull llama3 &&
      echo 'Downloading embedding model (nomic-embed-text)...' &&
      ollama pull nomic-embed-text &&
      echo 'Models ready for SamàBot!'
      "

volumes:
  samabot_pg_data:
  samabot_ollama_data: