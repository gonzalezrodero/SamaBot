name: "CI/CD: Infrastructure Destruction"

on:
  workflow_dispatch:
    inputs:
      target_folder:
        description: 'Terraform folder to DESTROY'
        required: true
        default: 'infra/serverless'
        type: choice
        options:
          - infra/serverless
          - infra/serverless
          - infra/db
          - infra/network
      confirmation:
        description: 'Type "yes" to confirm destruction'
        required: true
        default: 'no'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_ARN }}
  ENVIRONMENT: dev

jobs:
  destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "yes" ]; then
            echo "Destruction aborted. Confirmation was not 'yes'."
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="config/${{ env.ENVIRONMENT }}/config.remote"
        working-directory: ${{ github.event.inputs.target_folder }}

      - name: Terraform Destroy
        run: |
          # We pass a dummy image_tag to satisfy variable requirements during plan evaluation
          terraform destroy \
            -var-file="config/${{ env.ENVIRONMENT }}/config.tfvars" \
            -var="image_tag=destroy-dummy" \
            -auto-approve \
            -no-color
        working-directory: ${{ github.event.inputs.target_folder }}