name: Deploy API to ECS

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'terraform/**'

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: chatbot-api
  ECS_CLUSTER: chatbot-cluster
  ECS_SERVICE: chatbot-service
  ROLE_TO_ASSUME: arn:aws:iam::543704476214:role/chatbot-github-deploy-role
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate CalVer Tag
        id: calver
        run: |
          echo "tag=$(date +'%Y.%m.%d').${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.calver.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ==========================================
      # TERRAFORM DEPLOYMENT SECTION
      # ==========================================
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config=config/dev/config.remote -no-color

      - name: Terraform Apply
        run: |
          terraform apply \
            -var-file=config/dev/config.tfvars \
            -var="image_tag=${{ steps.calver.outputs.tag }}" \
            -auto-approve \
            -no-color